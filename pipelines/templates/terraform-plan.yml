jobs:
- job: TerraformPlan

  displayName: Terraform Plan

  steps:

  - checkout: self

  - task: TerraformInstaller@1
    displayName: Install Terraform

    inputs:
      terraformVersion: '1.5.7'

  - task: AzureCLI@2
    displayName: Terraform Plan

    inputs:
      azureSubscription: 'Azure-git-terraform-pipeline'
      scriptType: bash
      scriptLocation: inlineScript

      inlineScript: |

        echo "Changing directory..."

        cd environments/dev

        echo "Running terraform init..."

        terraform init

        echo "Running terraform plan..."

        terraform plan \
          -var="resource_group_name=rg-dev-platform-001" \
          -var="location=Central India" \
          -out=tfplan